<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="900" height="620" fill="#FBF7F0"/>

  <!-- title -->
  <text x="450" y="52" text-anchor="middle" font-size="30" font-weight="bold" fill="#23201B">🔊 O mapa dos sons difíceis</text>
  <text x="450" y="82" text-anchor="middle" font-size="16" fill="#23201B" opacity="0.65">8 sons do holandês e a aproximação mais próxima em português</text>

  <!-- ================= ROW 1 ================= -->

  <!-- card 1: ui -->
  <g>
    <rect x="30" y="104" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="60" y="104" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="127.5" y="176" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">ui</text>
    <line x1="62" y1="198" x2="193" y2="198" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="127.5" y="230" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “áu” bem fechado</text>
    <text x="127.5" y="268" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">huis</tspan> = casa 🏠</text>
  </g>

  <!-- card 2: eu -->
  <g>
    <rect x="245" y="104" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="275" y="104" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="342.5" y="176" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">eu</text>
    <line x1="277" y1="198" x2="408" y2="198" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="342.5" y="230" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “êu” arredondado</text>
    <text x="342.5" y="268" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">leuk</tspan> = legal 👍</text>
  </g>

  <!-- card 3: uu -->
  <g>
    <rect x="460" y="104" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="490" y="104" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="557.5" y="176" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">uu</text>
    <line x1="492" y1="198" x2="623" y2="198" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="557.5" y="230" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “i” com biquinho</text>
    <text x="557.5" y="268" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">uur</tspan> = hora ⏰</text>
  </g>

  <!-- card 4: ij / ei -->
  <g>
    <rect x="675" y="104" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="705" y="104" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="772.5" y="176" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">ij / ei</text>
    <line x1="707" y1="198" x2="838" y2="198" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="772.5" y="230" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “ei” de lei</text>
    <text x="772.5" y="268" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">trein</tspan> = trem 🚆</text>
  </g>

  <!-- ================= ROW 2 ================= -->

  <!-- card 5: oe -->
  <g>
    <rect x="30" y="319" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="60" y="319" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="127.5" y="391" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">oe</text>
    <line x1="62" y1="413" x2="193" y2="413" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="127.5" y="445" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “u” de uva</text>
    <text x="127.5" y="483" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">boek</tspan> = livro 📖</text>
  </g>

  <!-- card 6: g / ch -->
  <g>
    <rect x="245" y="319" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="275" y="319" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="342.5" y="391" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">g / ch</text>
    <line x1="277" y1="413" x2="408" y2="413" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="342.5" y="445" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “rr” carioca</text>
    <text x="342.5" y="483" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">goed</tspan> = bom ✅</text>
  </g>

  <!-- card 7: sch -->
  <g>
    <rect x="460" y="319" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="490" y="319" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="557.5" y="391" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">sch</text>
    <line x1="492" y1="413" x2="623" y2="413" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="557.5" y="445" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ s + “rr” carioca</text>
    <text x="557.5" y="483" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">school</tspan> = escola 🏫</text>
  </g>

  <!-- card 8: w -->
  <g>
    <rect x="675" y="319" width="195" height="195" rx="12" fill="#FFFFFF" stroke="#23201B" stroke-width="2.5"/>
    <rect x="705" y="319" width="135" height="5" rx="2.5" fill="#1D4E89"/>
    <text x="772.5" y="391" text-anchor="middle" font-size="44" font-weight="bold" fill="#1D4E89">w</text>
    <line x1="707" y1="413" x2="838" y2="413" stroke="#23201B" stroke-width="1" opacity="0.15"/>
    <text x="772.5" y="445" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E7A46">≈ “v” bem suave</text>
    <text x="772.5" y="483" text-anchor="middle" font-size="16" fill="#23201B"><tspan font-weight="bold">water</tspan> = água 💧</text>
  </g>

  <!-- ================= FOOTER ================= -->
  <rect x="30" y="540" width="840" height="56" rx="12" fill="#FFFFFF" stroke="#C99B2F" stroke-width="3"/>
  <text x="450" y="575" text-anchor="middle" font-size="18" fill="#23201B">💡 <tspan font-weight="bold" fill="#C99B2F">Regra de ouro:</tspan> vogal dobrada = som longo → <tspan font-weight="bold" fill="#1D4E89">aap · been · boot · uur</tspan></text>
</svg>
